# everything is self hosted
# the only shit where our team depends on e-commerce project is WEBHOOK_URL

name: my-stripe

services:
  my-stripe:
    build: .
    container_name: my-stripe
    environment:
      PORT: "8080"
      API_KEY: "test_api_key"
      WEBHOOK_SECRET: "dev_webhook_secret"
      WEBHOOK_URL: "http://host.docker.internal:8084/api/v1/webhooks/stripe"
      FINALIZE_DELAY: "3s"
      WEBHOOK_MAX_ATTEMPTS: "8"
      WEBHOOK_BASE_DELAY: "2s"
    ports:
      - "8090:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"