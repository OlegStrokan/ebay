apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: free-ebay
resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - kafka.yaml
  - jaeger.yaml
  - postgres-write.yaml
  - postgres-read.yaml
  - auth-postgres.yaml
  - user-postgres.yaml
  - inventory-postgres.yaml
  - product-postgres.yaml
  - payment-postgres.yaml
  - email-postgres.yaml
  - redis.yaml
  - elasticsearch.yaml
  - qdrant.yaml
  - ollama.yaml
  - mailhog.yaml
  - auth-service.yaml
  - user-service.yaml
  - inventory-service.yaml
  - order-service.yaml
  - product-service.yaml
  - payment-service.yaml
  - search-service.yaml
  - gateway-service.yaml
  - catalog-service.yaml
  - email-service.yaml
  - embedding-service.yaml
  - ai-search-service.yaml
  - vector-indexer-worker.yaml

# CI overrides these tags at deploy time via:
#   kustomize edit set image free-ebay/auth-service=free-ebay/auth-service:<GIT_SHA>
# or: kustomize edit set image free-ebay/auth-service:1.0.0=free-ebay/auth-service:<GIT_SHA>
images:
  - name: free-ebay/auth-service
    newTag: "1.0.0"
  - name: free-ebay/user-service
    newTag: "1.0.0"
  - name: free-ebay/inventory-service
    newTag: "1.0.0"
  - name: free-ebay/order-service
    newTag: "1.0.0"
  - name: free-ebay/product-service
    newTag: "1.0.0"
  - name: free-ebay/payment-service
    newTag: "1.0.0"
  - name: free-ebay/search-service
    newTag: "1.0.0"
  - name: free-ebay/gateway-api
    newTag: "1.0.0"
  - name: free-ebay/catalog-service
    newTag: "1.0.0"
  - name: free-ebay/email-service
    newTag: "1.0.0"
  - name: free-ebay/embedding-service
    newTag: "1.0.0"
  - name: free-ebay/ai-search-service
    newTag: "1.0.0"
  - name: free-ebay/vector-indexer-worker
    newTag: "1.0.0"